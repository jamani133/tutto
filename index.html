<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #111;
      color: #eee;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    /* Image buttons */
    .btn-img {
      width: 100%;
      aspect-ratio: 1 / 1; /* keeps square shape */
      object-fit: cover;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .btn-img:active {
      transform: scale(0.95);
    }

    /* Mobile: force 2 per row */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<h1>Tuttomat</h1>

<script>
function sendKey(k) {
  fetch("/input?key=" + k);
}

function sendWithConfirm(k, label) {
  if (confirm("Are you sure you want to execute: " + label + "?")) {
    sendKey(k);
  }
}
</script>


<!-- 🎲 Add Points -->
<h2>Add Points</h2>
<div class="grid">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/1.png?raw=true" alt="Add 1" onclick="sendKey('1')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/2.png?raw=true" alt="Add 2" onclick="sendKey('2')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/3.png?raw=true" alt="Add 3" onclick="sendKey('3')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/4.png?raw=true" alt="Add 4" onclick="sendKey('4')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/5.png?raw=true" alt="Add 5" onclick="sendKey('5')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/6.png?raw=true" alt="Add 6" onclick="sendKey('6')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/new.png?raw=true" alt="Next Roll" onclick="sendKey('_')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/clear.png?raw=true" alt="Clear Entry" onclick="sendKey('8')">
</div>


<!-- 🎮 Actions -->
<h2>Actions</h2>
<div class="grid">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/party.png?raw=true" alt="Party" onclick="sendKey('a')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/steal.png?raw=true" alt="Steal" onclick="sendKey('s')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/x2.png?raw=true" alt="Double" onclick="sendKey('d')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/street.png?raw=true" alt="Street" onclick="sendKey('f')">
</div>


<!-- 💰 Bonuses -->
<h2>Bonuses</h2>
<div class="grid">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/200.png?raw=true" alt="200 Bonus" onclick="sendKey('g')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/300.png?raw=true" alt="300 Bonus" onclick="sendKey('h')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/400.png?raw=true" alt="400 Bonus" onclick="sendKey('j')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/500.png?raw=true" alt="500 Bonus" onclick="sendKey('k')">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/600.png?raw=true" alt="600 Bonus" onclick="sendKey('l')">
</div>



<!-- ⚠️ System / Dangerous -->
<h2>System</h2>
<div class="grid">
  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/fuck.png?raw=true" alt="Fucked Up"
       onclick="sendWithConfirm('=', 'FuckedUp?')">

  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/tut.png?raw=true" alt="Tutto"
       onclick="sendWithConfirm('T', 'Tut?')">

  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/end.png?raw=true" alt="Player Ended"
       onclick="sendWithConfirm('N', 'Player Ended?')">

  <img class="btn-img" src="https://github.com/jamani133/tutto/blob/main/icons/oops.png?raw=true" alt="Oops"
       onclick="sendWithConfirm('R', 'Reset?')">
</div>


</body>
</html>
