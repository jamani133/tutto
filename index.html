<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #111;
      color: #eee;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    /* Image buttons */
    .btn-img {
      width: 100%;
      aspect-ratio: 1 / 1; /* keeps square shape */
      object-fit: cover;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .btn-img:active {
      transform: scale(0.95);
    }

    /* Mobile: force 2 per row */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<h1>Processing Controller</h1>

<script>
function sendKey(k) {
  fetch("/input?key=" + k);
}

function sendWithConfirm(k, label) {
  if (confirm("Are you sure you want to execute: " + label + "?")) {
    sendKey(k);
  }
}
</script>


<!-- 🎲 Add Points -->
<h2>Add Points</h2>
<div class="grid">
  <img class="btn-img" src="https://your-url.com/add1.png" alt="Add 1" onclick="sendKey('1')">
  <img class="btn-img" src="https://your-url.com/add2.png" alt="Add 2" onclick="sendKey('2')">
  <img class="btn-img" src="https://your-url.com/add3.png" alt="Add 3" onclick="sendKey('3')">
  <img class="btn-img" src="https://your-url.com/add4.png" alt="Add 4" onclick="sendKey('4')">
  <img class="btn-img" src="https://your-url.com/add5.png" alt="Add 5" onclick="sendKey('5')">
  <img class="btn-img" src="https://your-url.com/add6.png" alt="Add 6" onclick="sendKey('6')">
</div>


<!-- 🎮 Actions -->
<h2>Actions</h2>
<div class="grid">
  <img class="btn-img" src="https://your-url.com/next.png" alt="Next Roll" onclick="sendKey('_')">
  <img class="btn-img" src="https://your-url.com/clear.png" alt="Clear Entry" onclick="sendKey('8')">
  <img class="btn-img" src="https://your-url.com/party.png" alt="Party" onclick="sendKey('a')">
  <img class="btn-img" src="https://your-url.com/steal.png" alt="Steal" onclick="sendKey('s')">
  <img class="btn-img" src="https://your-url.com/double.png" alt="Double" onclick="sendKey('d')">
  <img class="btn-img" src="https://your-url.com/street.png" alt="Street" onclick="sendKey('f')">
</div>


<!-- 💰 Bonuses -->
<h2>Bonuses</h2>
<div class="grid">
  <img class="btn-img" src="https://your-url.com/200.png" alt="200 Bonus" onclick="sendKey('g')">
  <img class="btn-img" src="https://your-url.com/300.png" alt="300 Bonus" onclick="sendKey('h')">
  <img class="btn-img" src="https://your-url.com/400.png" alt="400 Bonus" onclick="sendKey('j')">
  <img class="btn-img" src="https://your-url.com/500.png" alt="500 Bonus" onclick="sendKey('k')">
  <img class="btn-img" src="https://your-url.com/600.png" alt="600 Bonus" onclick="sendKey('l')">
</div>



<!-- ⚠️ System / Dangerous -->
<h2>System</h2>
<div class="grid">
  <img class="btn-img" src="https://your-url.com/fuckedup.png" alt="Fucked Up"
       onclick="sendWithConfirm('=', 'FuckedUp?')">

  <img class="btn-img" src="https://your-url.com/fuckedup.png" alt="Tutto"
       onclick="sendWithConfirm('T', 'Tut?')">

  <img class="btn-img" src="https://your-url.com/playerended.png" alt="Player Ended"
       onclick="sendWithConfirm('N', 'Player Ended?')">

  <img class="btn-img" src="https://your-url.com/reset.png" alt="Oops"
       onclick="sendWithConfirm('R', 'Reset?')">
</div>


</body>
</html>
